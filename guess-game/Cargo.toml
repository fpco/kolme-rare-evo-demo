[package]
name = "guess-game"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
clap = { version = "4.5.41", features = ["env", "derive"] }
kolme = { path = "../../kolme/packages/kolme" }
reqwest = { version = "0.12.22", features = ["rustls-tls", "json", "gzip", "brotli", "blocking"] }
rust_decimal = { version = "1.37.2", features = ["macros"] }
serde = { version = "1.0.219", features = ["derive"] }
shared = { path = "../../kolme/packages/shared" }
tokio = { version = "1.46.1", features = ["full"] }
